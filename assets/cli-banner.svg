      <text x="24" y="150" fill="#8b949e">academic reference verification  —  AI-text detection</text>
      <text x="756" y="150" fill="#34d399" text-anchor="end" font-weight="700">v3.1.0</text>
      <text x="24" y="174" fill="#e6edf3">academic-refchecker &lt;input&gt; [options]   ·   add --help for the full list</text>
      <text x="24" y="204" fill="#d96cff" font-weight="700">Check</text>
      <text x="44" y="222" fill="#22d3ee">--paper</text>
      <text x="184" y="222" fill="#e6edf3">one paper — ArXiv ID, URL, PDF, .tex, .bib, or text</text>
      <text x="44" y="239" fill="#22d3ee">--paper-list</text>
      <text x="184" y="239" fill="#e6edf3">many papers from a newline-delimited file</text>
      <text x="44" y="256" fill="#22d3ee">--openreview</text>
      <text x="184" y="256" fill="#e6edf3">fetch + scan an entire OpenReview venue</text>
      <text x="24" y="286" fill="#d96cff" font-weight="700">AI-text detection</text>
      <text x="220" y="286" fill="#8b949e">· opt-in, advisory — never proof of misconduct</text>
      <text x="44" y="304" fill="#22d3ee">local</text>
      <text x="184" y="304" fill="#e6edf3">desklib DeBERTa — offline &amp; calibrated (download in Settings)</text>
      <text x="44" y="321" fill="#22d3ee">llm-judge</text>
      <text x="184" y="321" fill="#e6edf3">reuse your configured LLM provider (uncalibrated)</text>
      <text x="44" y="338" fill="#22d3ee">external</text>
      <text x="184" y="338" fill="#e6edf3">Pangram / GPTZero — key + explicit consent</text>
      <text x="24" y="368" fill="#d96cff" font-weight="700">Output</text>
      <text x="44" y="386" fill="#22d3ee">--report-file</text>
      <text x="184" y="386" fill="#e6edf3">structured report — json · jsonl · csv · text</text>
      <text x="44" y="403" fill="#22d3ee">--output-file</text>
      <text x="184" y="403" fill="#e6edf3">human-readable error list</text>
      <text x="24" y="433" fill="#d96cff" font-weight="700">Environment</text>
      <text x="24" y="451" fill="#8b949e">python 3.11+  ·  macOS / Linux / Windows  ·  runtime ● torch/onnx ● transformers ● llm sdks</text>
      <text x="24" y="468" fill="#8b949e">sources  Semantic Scholar · OpenAlex · Crossref · DBLP · ACL Anthology · arXiv · OpenReview</text>
  </g>
