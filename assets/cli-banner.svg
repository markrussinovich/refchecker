<svg xmlns="http://www.w3.org/2000/svg" width="780" height="486" viewBox="0 0 780 486" role="img" aria-label="RefChecker CLI banner">
  <defs><clipPath id="r"><rect width="780" height="486" rx="12"/></clipPath></defs>
  <g clip-path="url(#r)" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5">
    <rect width="780" height="486" fill="#0d1117"/>
    <!-- window chrome -->
    <rect width="780" height="30" fill="#161b22"/>
    <circle cx="18" cy="15" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="15" r="5" fill="#27c93f"/>
    <text x="390" y="19" text-anchor="middle" fill="#8b949e" font-size="11">academic-refchecker</text>

    <g xml:space="preserve" font-size="13">
      <!-- REFCHECKER block wordmark, cyan→green vertical gradient -->
      <text x="22" y="58"  fill="#22d3ee">███  ████ ████  ███ █  █ ████  ███ █  █ ████ ███ </text>
      <text x="22" y="74"  fill="#26d2d2">█  █ █    █    █    █  █ █    █    █ █  █    █  █</text>
      <text x="22" y="90"  fill="#2bd2bd">███  ███  ███  █    ████ ███  █    ██   ███  ███ </text>
      <text x="22" y="106" fill="#2fd2ab">█ █  █    █    █    █  █ █    █    █ █  █    █ █ </text>
      <text x="22" y="122" fill="#34d399">█  █ ████ █     ███ █  █ ████  ███ █  █ ████ █  █</text>
    </g>

    <g xml:space="preserve">
      <text x="22" y="152" fill="#8b949e">  academic reference verification  <tspan fill="#34d399">+</tspan>  AI-text detection   <tspan fill="#34d399">v0.8.0</tspan></text>
      <text x="22" y="176" fill="#e6edf3" font-weight="700">  academic-refchecker <tspan fill="#8b949e" font-weight="400">&lt;input&gt; [options]</tspan>   <tspan fill="#8b949e" font-weight="400">·   add</tspan> <tspan fill="#22d3ee" font-weight="400">--help</tspan> <tspan fill="#8b949e" font-weight="400">for the full list</tspan></text>

      <text x="22" y="206" fill="#d96cff" font-weight="700">  Check</text>
      <text x="22" y="223" fill="#e6edf3">    <tspan fill="#22d3ee">--paper      </tspan> one paper — ArXiv ID, URL, PDF, .tex, .bib, or text</text>
      <text x="22" y="240" fill="#e6edf3">    <tspan fill="#22d3ee">--paper-list </tspan> many papers from a newline-delimited file</text>
      <text x="22" y="257" fill="#e6edf3">    <tspan fill="#22d3ee">--openreview </tspan> fetch + scan an entire OpenReview venue</text>

      <text x="22" y="287" fill="#d96cff" font-weight="700">  AI-text detection  <tspan fill="#8b949e" font-weight="400">· opt-in, advisory — never proof of misconduct</tspan></text>
      <text x="22" y="304" fill="#e6edf3">    <tspan fill="#22d3ee">local        </tspan> <tspan fill="#34d399">●</tspan> desklib DeBERTa — offline &amp; calibrated</text>
      <text x="22" y="321" fill="#e6edf3">    <tspan fill="#22d3ee">llm-judge    </tspan> reuse your configured LLM provider (uncalibrated)</text>
      <text x="22" y="338" fill="#e6edf3">    <tspan fill="#22d3ee">external     </tspan> Pangram / GPTZero — key + explicit consent</text>

      <text x="22" y="368" fill="#d96cff" font-weight="700">  Output</text>
      <text x="22" y="385" fill="#e6edf3">    <tspan fill="#22d3ee">--report-file</tspan> structured report — json · jsonl · csv · text</text>
      <text x="22" y="402" fill="#e6edf3">    <tspan fill="#22d3ee">--output-file</tspan> human-readable error list</text>

      <text x="22" y="432" fill="#d96cff" font-weight="700">  Environment</text>
      <text x="22" y="449" fill="#8b949e">    python <tspan fill="#e6edf3">3.11+</tspan>  ·  <tspan fill="#e6edf3">macOS / Linux / Windows</tspan>     runtime <tspan fill="#34d399">●</tspan> torch/onnx <tspan fill="#34d399">●</tspan> transformers <tspan fill="#34d399">●</tspan> llm sdks</text>
      <text x="22" y="466" fill="#8b949e">    sources  Semantic Scholar · OpenAlex · Crossref · DBLP · ACL Anthology · arXiv · OpenReview</text>
    </g>
  </g>
</svg>
